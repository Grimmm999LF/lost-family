<!DOCTYPE html>

<title>Kalkulator Lost Family!</title>

<style>
body {
    background: #0b0b0b;
    font-family: Arial, sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.container {
    width: 1200px;
    background: #111;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(255,120,0,0.3);
    padding: 25px;
    display: flex;
    gap: 20px;
}

h2 {
    color: #ff8c00;
    margin-bottom: 10px;
}

.section {
    margin-bottom: 25px;
}

select {
    width: 100%;
    padding: 10px;
    background: #1b1b1b;
    color: white;
    border: 1px solid #ff8c00;
    border-radius: 6px;
    font-size: 16px;
}

.parts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-height: 300px;
    overflow-y: auto;
}

.part {
    background: #1a1a1a;
    padding: 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #222;
}

.part input {
    transform: scale(1.3);
}

.summary {
    background: #0d0d0d;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ff8c00;
}

.total {
    font-size: 22px;
    color: #ff8c00;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #ff8c00;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ffa733;
}
.logo {
    text-align: center;
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 30px;
    color: #ff8c00;
    animation: glow 2.5s infinite ease-in-out;
}

/* animacja świecenia */
@keyframes glow {
    0% {
        text-shadow: 0 0 5px #ff8c00,
                     0 0 10px #ff8c00;
    }
    50% {
        text-shadow: 0 0 20px #ff8c00,
                     0 0 40px #ff8c00;
    }
    100% {
        text-shadow: 0 0 5px #ff8c00,
                     0 0 10px #ff8c00;
    }
}
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tab {
    padding: 10px 18px;
    border-radius: 10px;
    background: #151515;
    border: 1px solid #222;
    cursor: pointer;
    transition: 0.25s;
    font-weight: 500;
}

.tab:hover {
    border: 1px solid #ff8c00;
}

.tab.active {
    background: #ff8c00;
    color: black;
    box-shadow: 0 0 15px rgba(255,140,0,0.5);
}
</style>

let cyl = 0;      // 0=V4, 1=V6, 2=V8

// Tworzenie zakładek
parts.forEach((category, index) => {
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.innerText = category.category;

    if(index === 0) tab.classList.add("active");

    tab.onclick = function() {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        activeCategory = index;
        renderParts();
    };

    categoryTabs.appendChild(tab);
});

// Funkcja renderująca części
function renderParts() {
    partsList.innerHTML = "";

    parts[activeCategory].items.forEach(part => {
        const div = document.createElement("div");
        div.className = "part";

        // sprawdź czy było wcześniej zaznaczone
        const checked = selectedParts[part.name] ? "checked" : "";

        div.innerHTML = `
            <label>
                <input type="checkbox" data-name="${part.name}" data-price="${part.price}" ${checked}>
                ${part.name}
            </label>
            <span>${part.price.toLocaleString()} PLN</span>
        `;

        const checkbox = div.querySelector("input");

        // zapisuj stan po kliknięciu
        checkbox.addEventListener("change", function() {
            if (this.checked) {
                selectedParts[part.name] = part.price;
            } else {
                delete selectedParts[part.name];
            }
            calculate();
        });

        partsList.appendChild(div);
    });
}

function filterCars() {
    const input = document.getElementById("carSearch").value.toLowerCase();
    const results = document.getElementById("carResults");
    results.innerHTML = "";

    if (input === "") return;

    cars.forEach(car => {
        if (car.name.toLowerCase().includes(input)) {
            const div = document.createElement("div");
            div.style.padding = "8px";
            div.style.cursor = "pointer";
            div.innerText = car.name + " – " + car.price.toLocaleString() + " PLN";

            div.onclick = function() {
                document.getElementById("carSearch").value = car.name;
                document.getElementById("carSelect").value = car.price;
                results.innerHTML = "";
                calculate();
            };

            div.onmouseover = () => div.style.background = "#333";
            div.onmouseout = () => div.style.background = "transparent";

            results.appendChild(div);
        }
    });
}
// Generowanie listy


document.getElementById("carSelect").addEventListener("change", calculate);


function toggleTFT() {
    const tftChecked = document.getElementById("tftOption").checked;

    if (tftChecked) {
        // zaznacz WSZYSTKIE części ze wszystkich kategorii
parts.forEach(category => {
    category.items.forEach(part => {

        // części wykluczone z TFT
        const excluded = ["Nitro 5L", "Nitro 10L", "Nitro 15L"];

        if (!excluded.includes(part.name)) {
            selectedParts[part.name] = part.price;
        }
    });
});
    } else {
        // odznacz wszystko
        selectedParts = {};
    }

    // odśwież widok aktualnej zakładki
    renderParts();
    calculate();
}
function calculate() {
    let total = parseInt(document.getElementById("carSelect").value) || 0;
    let count = 0;

for (let name in selectedParts) {
    total += selectedParts[name];
    count++;
}

    // koszt cylindrów (200k za klik)
    total += cyl * 200000;
    count += cyl;

    // koszt pojemności (200k za klik)
    total += engine * 200000;
    count += engine;

    // koszt zbiornika (250k za klik)
    total += fuel * 250000;
    count += fuel;

document.getElementById("total").innerText = total.toLocaleString();
document.getElementById("count").innerText = count;

updatePreview();
}
function addCyl() {
    if (cyl < 2) {
        cyl++;
        const values = ["V4", "V6", "V8"];
        document.getElementById("cyl").innerText = values[cyl];
        calculate();
    }
}

function addEngine() {
    if (engine < 9) { // 1.2 → 3.0
        engine++;
        let value = (1.2 + engine * 0.2).toFixed(1);
        document.getElementById("engine").innerText = value;
        calculate();
    }
}

function addFuel() {
    if (fuel < 3) { // 25 → 100
        fuel++;
        let value = 25 + fuel * 25;
        document.getElementById("fuel").innerText = value + "L";
        calculate();
    }
}
function removeCyl() {
    if (cyl > 0) {
        cyl--;
        const values = ["V4", "V6", "V8"];
        document.getElementById("cyl").innerText = values[cyl];
        calculate();
    }
}

function removeEngine() {
    if (engine > 0) {
        engine--;
        let value = (1.2 + engine * 0.2).toFixed(1);
        document.getElementById("engine").innerText = value;
        calculate();
    }
}

function removeFuel() {
    if (fuel > 0) {
        fuel--;
        let value = 25 + fuel * 25;
        document.getElementById("fuel").innerText = value + "L";
        calculate();
    }
}
function resetAll() {
    document.getElementById("carSelect").value = 0;
    selectedParts = {};
    renderParts();
    calculate();
}
function updatePreview() {
    // AUTO
    const carName = document.getElementById("carSearch").value || "Brak";
    document.getElementById("previewCar").innerText = carName;

    // CZĘŚCI
    const partsDiv = document.getElementById("previewParts");
    partsDiv.innerHTML = "";

    for (let name in selectedParts) {
        const div = document.createElement("div");
        div.innerText = "• " + name;
        partsDiv.appendChild(div);
    }

    if (partsDiv.innerHTML === "") {
        partsDiv.innerText = "Brak";
    }

    // ULEPSZENIA
    const cylText = document.getElementById("cyl").innerText;
    const engineText = document.getElementById("engine").innerText;

    document.getElementById("previewUpgrades").innerHTML =
        "Cylindry: " + cylText + "<br>" +
        "Pojemność: " + engineText + "<br>" +
        "Zbiornik: " + fuelText;

    // CENA
    document.getElementById("previewTotal").innerText =
        document.getElementById("total").innerText;
}
